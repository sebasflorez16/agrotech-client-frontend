# 🏠 Configuración de Netlify para DESARROLLO LOCAL
# ⚠️  NUNCA subir a git — este archivo está en .gitignore
#
# Uso: ./scripts/switch-env.sh local

[build]
  publish = "."
  command = "echo '🏠 Modo desarrollo local'"

[build.environment]
  NODE_VERSION = "18"

# Para desarrollo local necesitamos el proxy dev de Netlify
# netlify dev sirve los archivos estáticos del directorio publish="."
# y aplica los redirects de abajo para proxear /api/* y /staff/api/* a Django
[dev]
  port = 8080

# ========================================
# REDIRECTS - ORDEN CRÍTICO (LOCAL)
# ========================================

# 1. Dashboard
[[redirects]]
  from = "/dashboard"
  to = "/templates/dashboard.html"
  status = 200

# 2. Billing
[[redirects]]
  from = "/billing"
  to = "/templates/billing.html"
  status = 200

# 2b. Staff operator dashboard (API proxy primero, luego HTML)
[[redirects]]
  from = "/staff/api/*"
  to = "http://localhost:8000/staff/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/staff"
  to = "/templates/staff-dashboard.html"
  status = 200

# 3. Login
[[redirects]]
  from = "/login"
  to = "/templates/authentication/login.html"
  status = 200

# 3b. Register
[[redirects]]
  from = "/register"
  to = "/templates/authentication/register.html"
  status = 200

# 3c. Authentication files (fallback for relative paths)
[[redirects]]
  from = "/authentication/*"
  to = "/templates/authentication/:splat"
  status = 200

# 3d. /static/* → archivos locales
[[redirects]]
  from = "/static/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/static/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/static/images/*"
  to = "/images/:splat"
  status = 200

# 4a. Billing webhooks → localhost
[[redirects]]
  from = "/billing/*"
  to = "http://localhost:8000/billing/:splat"
  status = 200
  force = true

# 4. API → Django local
[[redirects]]
  from = "/api/*"
  to = "http://localhost:8000/api/:splat"
  status = 200
  force = true

# 5. 404 → Landing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
