<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0B0F14">
    <title>Recuperar Contraseña - AgroTech Digital</title>
    <link rel="shortcut icon" href="../../images/agrotech solo negro.png">
    <link rel="stylesheet" href="../../css/liquid-glass-system.css">
    <script src="../../js/config.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #F5F5F7 0%, #E8E8ED 100%);
            background-attachment: fixed; position: relative; overflow: hidden;
        }
        .bg-blob {
            position: absolute; border-radius: 50%; filter: blur(80px);
            opacity: 0.3; animation: float 20s infinite ease-in-out;
        }
        .blob-1 { width: 400px; height: 400px; background: linear-gradient(135deg, var(--agrotech-primary) 0%, var(--agrotech-primary-light) 100%); top: -200px; left: -200px; }
        .blob-2 { width: 300px; height: 300px; background: linear-gradient(135deg, var(--agrotech-accent) 0%, #FFB340 100%); bottom: -150px; right: -150px; animation-delay: 5s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(20px, 10px) scale(1.05); }
        }
        .recover-container {
            background: var(--glass-white); backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius-xl);
            padding: var(--space-2xl); width: 90%; max-width: 440px;
            box-shadow: var(--shadow-glass); position: relative; z-index: 10;
        }
        .logo-container { text-align: center; margin-bottom: var(--space-2xl); }
        .logo-container img { max-width: 80px; margin-bottom: var(--space-md); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1)); }
        .brand-name {
            font-size: 1.5rem; font-weight: var(--font-weight-bold);
            background: linear-gradient(135deg, var(--agrotech-primary) 0%, var(--agrotech-primary-dark) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: var(--space-xs);
        }
        .subtitle { color: var(--text-secondary); font-size: 0.875rem; }
        .form-group { margin-bottom: var(--space-lg); }
        .form-label { display: block; font-size: 0.875rem; font-weight: var(--font-weight-medium); color: var(--text-primary); margin-bottom: var(--space-xs); }
        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: var(--space-md); top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 1.25rem; }
        .form-input {
            width: 100%; padding: var(--space-md) var(--space-md) var(--space-md) 3rem;
            background: var(--glass-white); backdrop-filter: var(--glass-blur-light);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            font-family: var(--font-primary); font-size: 1rem; color: var(--text-primary);
            transition: all 0.2s ease; box-sizing: border-box;
        }
        .form-input:focus { outline: none; border-color: var(--agrotech-primary); box-shadow: 0 0 0 3px rgba(47,179,68,0.1); background: rgba(255,255,255,0.95); }
        .btn-submit {
            width: 100%; padding: var(--space-md) var(--space-xl);
            background: linear-gradient(135deg, var(--agrotech-primary) 0%, var(--agrotech-primary-dark) 100%);
            color: white; border: none; border-radius: var(--radius-full);
            font-weight: var(--font-weight-semibold); font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(47,179,68,0.3); margin-top: var(--space-lg);
        }
        .btn-submit:hover { background: linear-gradient(135deg, var(--agrotech-primary-light) 0%, var(--agrotech-primary) 100%); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(47,179,68,0.4); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .loading-spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: var(--space-sm); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-submit.loading .loading-spinner { display: inline-block; }
        .message { border-radius: var(--radius-md); padding: var(--space-md); margin-bottom: var(--space-lg); font-size: 0.875rem; display: none; align-items: center; gap: var(--space-sm); }
        .message.show { display: flex; }
        .message.error { background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.2); color: #DC2626; }
        .message.success { background: rgba(22,163,74,0.1); border: 1px solid rgba(22,163,74,0.2); color: #16A34A; }
        .back-link { text-align: center; margin-top: var(--space-lg); font-size: 0.875rem; }
        .back-link a { color: var(--agrotech-primary); text-decoration: none; font-weight: var(--font-weight-medium); }
        .back-link a:hover { color: var(--agrotech-primary-dark); }
        @media (max-width: 768px) {
            .recover-container { padding: var(--space-xl); border-radius: var(--radius-lg); }
            .brand-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <div class="recover-container">
        <div class="logo-container">
            <img src="../../images/agrotech solo negro.png" alt="AgroTech">
            <div class="brand-name">AgroTech Digital</div>
            <p class="subtitle">Recuperar Contraseña</p>
        </div>

        <div id="msgBox" class="message">
            <i class="ti ti-info-circle"></i>
            <span id="msgText"></span>
        </div>

        <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: var(--space-lg); text-align: center;">
            Ingresa el correo electrónico de tu cuenta y te enviaremos instrucciones para restablecer tu contraseña.
        </p>

        <form id="recoverForm">
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <div class="input-wrapper">
                    <i class="ti ti-mail input-icon"></i>
                    <input type="email" id="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <span class="loading-spinner"></span>
                <span id="btnText">Enviar instrucciones</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html"><i class="ti ti-arrow-left" style="margin-right: 4px;"></i>Volver al inicio de sesión</a>
        </div>
    </div>

    <script>
    (() => {
        const API_BASE = (window.AGROTECH_CONFIG && window.AGROTECH_CONFIG.API_BASE)
            ? window.AGROTECH_CONFIG.API_BASE
            : (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
                ? 'http://localhost:8000'
                : 'https://agrotech-digital-production.up.railway.app';

        const form = document.getElementById('recoverForm');
        const btn = document.getElementById('btnSubmit');
        const btnText = document.getElementById('btnText');
        const msgBox = document.getElementById('msgBox');
        const msgText = document.getElementById('msgText');

        function showMsg(text, type) {
            msgBox.className = 'message show ' + type;
            msgText.textContent = text;
        }

        function setLoading(on) {
            btn.disabled = on;
            btn.classList.toggle('loading', on);
            btnText.textContent = on ? 'Enviando...' : 'Enviar instrucciones';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            setLoading(true);
            try {
                const resp = await fetch(`${API_BASE}/api/auth/password/reset/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                if (resp.ok) {
                    showMsg('Si el correo está registrado, recibirás instrucciones para restablecer tu contraseña.', 'success');
                    form.style.display = 'none';
                } else {
                    // Always show generic message for security (don't reveal if email exists)
                    showMsg('Si el correo está registrado, recibirás instrucciones para restablecer tu contraseña.', 'success');
                    form.style.display = 'none';
                }
            } catch (err) {
                // Even on network error, show success for security
                showMsg('Si el correo está registrado, recibirás instrucciones para restablecer tu contraseña. Si no lo recibes en unos minutos, contacta al administrador.', 'success');
                form.style.display = 'none';
            }
            setLoading(false);
        });
    })();
    </script>
</body>
</html>
